<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <title>Ya!Cool POS System</title>
    <style>
        body { background: #f0f2f5; font-family: sans-serif; -webkit-tap-highlight-color: transparent; }
        .hidden { display: none !important; }
        .card { border-radius: 15px; border: none; box-shadow: 0 4px 10px rgba(0,0,0,0.08); }
        .qty-control { display: flex; align-items: center; gap: 8px; }
        .qty-btn { width: 35px; height: 35px; border-radius: 8px; border: 1px solid #ddd; background: white; font-weight: bold; }
        .stat-card { background: white; padding: 15px; border-radius: 12px; text-align: center; border-bottom: 4px solid #0d6efd; }
        /* Tombol History Besar */
        .btn-history-big { padding: 12px 20px; font-weight: bold; font-size: 1rem; border-radius: 10px; width: 100%; margin-bottom: 10px; }
        @media print { .no-print { display: none; } }
    </style>
</head>
<body>

<div id="p-login" class="container mt-5" style="max-width: 400px;">
    <div class="card p-4 text-center shadow">
        <h3 class="fw-bold text-primary mb-4">Ya!Cool POS</h3>
        <input type="text" id="u" class="form-control mb-2" placeholder="Username">
        <input type="password" id="p" class="form-control mb-3" placeholder="Password">
        <button onclick="doLogin()" id="btn-login" class="btn btn-primary w-100 fw-bold py-2">MASUK</button>
    </div>
</div>

<div id="p-staff" class="container-fluid py-3 hidden">
    <div class="row">
        <div class="col-md-7 no-print">
            <div class="bg-white p-3 rounded mb-3 shadow-sm">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h5 class="fw-bold m-0 text-truncate">Kasir: <span id="lbl-user" class="text-primary"></span></h5>
                    <button class="btn btn-outline-danger btn-sm" onclick="location.reload()"><i class="bi bi-power"></i></button>
                </div>
                <button class="btn btn-primary btn-history-big" onclick="showHistory()">
                    <i class="bi bi-clock-history me-2"></i> BUKA RIWAYAT PENJUALAN
                </button>
            </div>
            
            <div id="area-kasir" class="card p-3 shadow-sm">
                <div id="m-list" class="list-group list-group-flush"></div>
            </div>

            <div id="area-history" class="hidden">
                <button class="btn btn-secondary w-100 mb-3 fw-bold py-2" onclick="backToKasir()">← KEMBALI KE MENU</button>
                <div class="card p-2 shadow-sm">
                    <div class="table-responsive">
                        <table class="table table-sm table-hover small">
                            <thead class="table-light"><tr><th>Jam</th><th>Total</th><th>Cetak</th></tr></thead>
                            <tbody id="h-list"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-md-5 no-print mt-3 mt-md-0">
            <div class="card p-3 shadow border-0" style="position: sticky; top: 15px;">
                <h6 class="fw-bold border-bottom pb-2"><i class="bi bi-cart3"></i> Pesanan</h6>
                <div id="cart-list" style="min-height: 100px; max-height: 250px; overflow-y: auto;"></div>
                <div class="d-flex justify-content-between h3 fw-bold text-primary mt-2"><span>TOTAL</span><span id="v-total">0</span></div>
                <div class="mt-3">
                    <label class="small fw-bold">Bayar Tunai (Cash):</label>
                    <input type="number" id="v-cash" oninput="calc()" class="form-control form-control-lg fw-bold text-success" placeholder="0">
                </div>
                <div class="d-flex justify-content-between mt-2 h5 text-danger fw-bold bg-light p-2 rounded"><span>Kembali:</span><span id="v-change">0</span></div>
                <button onclick="doPay()" id="btn-pay" class="btn btn-success w-100 mt-3 btn-lg fw-bold py-3 shadow">
                    PROSES & CETAK STRUK <i class="bi bi-printer ms-1"></i>
                </button>
            </div>
        </div>
    </div>
</div>

<div id="p-admin" class="container py-4 hidden">
    <div class="d-flex justify-content-between mb-4 align-items-center">
        <h3 class="fw-bold m-0">Admin Panel</h3>
        <button onclick="location.reload()" class="btn btn-danger btn-sm">Logout</button>
    </div>
    <div class="card p-3 mb-4 shadow-sm">
        <div class="input-group">
            <input type="date" id="admin-filter-date" class="form-control">
            <button class="btn btn-primary" onclick="loadAdminStats()">Tarik Data</button>
            <button class="btn btn-success" onclick="printLaporanAdmin()">Cetak Stok</button>
        </div>
    </div>
    <div class="row g-3 mb-4">
        <div class="col-6 col-md-3"><div class="stat-card"><p class="small text-muted mb-1">OMSET</p><h4 id="adm-omset" class="fw-bold text-primary">0</h4></div></div>
        <div class="col-6 col-md-3"><div class="stat-card"><p class="small text-muted mb-1">CUP</p><h4 id="adm-cups" class="fw-bold text-success">0</h4></div></div>
        <div class="col-6 col-md-3"><div class="stat-card"><p class="small text-muted mb-1">STOK CUP</p><h4 id="adm-stok-cup" class="fw-bold text-warning">0</h4></div></div>
        <div class="col-6 col-md-3"><div class="stat-card"><p class="small text-muted mb-1">PROFIT</p><h4 id="adm-profit" class="fw-bold text-danger">0</h4></div></div>
    </div>
    <div id="adm-detail-stok" class="card p-3 small shadow-sm"></div>
</div>

<script>
    // URL Web App Sandy Yusuf
    const API = "https://script.google.com/macros/s/AKfycbz7Qdsnze_d0vAC460hUWOxRbEvgIDea_4RSvT8etHf7BCu9FKJASIqjRaLFtahd3Q/exec"; 
    
    let cart = []; 
    let user = "";
    const PRICING = { "Nanas":10000, "Mangga":10000, "Strawberry":10000, "Anggur":10000, "Semangka":10000, "Melon":10000, "Jeruk":10000, "Apel":10000, "Belimbing":10000, "Boba":2000, "Jelly":2000, "Cheese":2000, "Oreo":2000, "Meses":2000 };

    async function doLogin() {
        const u = document.getElementById('u').value, p = document.getElementById('p').value;
        if(!u || !p) return;
        document.getElementById('btn-login').innerText = "Logging in...";
        try {
            const r = await fetch(API, { method: 'POST', body: JSON.stringify({ action: 'login', user: u, pass: p }) });
            const d = await r.json();
            if (d.success) {
                user = d.user;
                document.getElementById('p-login').classList.add('hidden');
                if(d.role === 'admin') {
                    document.getElementById('p-admin').classList.remove('hidden');
                    document.getElementById('admin-filter-date').valueAsDate = new Date();
                    loadAdminStats();
                } else {
                    document.getElementById('p-staff').classList.remove('hidden');
                    document.getElementById('lbl-user').innerText = user;
                    initMenu();
                }
            } else { alert("User/Pass Salah!"); location.reload(); }
        } catch (e) { alert("Masalah Koneksi!"); location.reload(); }
    }

    function initMenu() {
        document.getElementById('m-list').innerHTML = Object.entries(PRICING).map(([n, p]) => `
            <div class="list-group-item d-flex justify-content-between align-items-center py-2 px-1">
                <div><div class="fw-bold" style="font-size:0.9rem">${n}</div><small class="text-muted">Rp ${p.toLocaleString()}</small></div>
                <div class="qty-control">
                    <button class="qty-btn" onclick="updateQty('${n}', ${p}, -1)">-</button>
                    <span id="q-${n.replace(/\s/g,'')}" class="fw-bold" style="min-width:20px; text-align:center">0</span>
                    <button class="qty-btn bg-primary text-white border-0" onclick="updateQty('${n}', ${p}, 1)">+</button>
                </div>
            </div>`).join('');
    }

    function updateQty(n, p, c) {
        const lbl = document.getElementById(`q-${n.replace(/\s/g,'')}`);
        let cur = parseInt(lbl.innerText);
        if(cur + c < 0) return;
        lbl.innerText = cur + c;
        if(c > 0) cart.push({ n, p, id: Date.now() + Math.random() });
        else { const idx = cart.findLastIndex(x => x.n === n); if(idx !== -1) cart.splice(idx, 1); }
        renderCart();
    }

    function renderCart() {
        let t = 0;
        const group = cart.reduce((a, b) => { a[b.n] = (a[b.n] || 0) + 1; t += b.p; return a; }, {});
        document.getElementById('cart-list').innerHTML = Object.entries(group).map(([n, q]) => `
            <div class="d-flex justify-content-between small py-1 border-bottom"><span>${q}x ${n}</span><span class="fw-bold">${(q*PRICING[n]).toLocaleString()}</span></div>
        `).join('') || '<p class="text-center text-muted small mt-3">Belum ada pesanan</p>';
        document.getElementById('v-total').innerText = t.toLocaleString();
        calc();
    }

    function calc() {
        const tot = parseInt(document.getElementById('v-total').innerText.replace(/\D/g,'')) || 0;
        const csh = parseInt(document.getElementById('v-cash').value) || 0;
        document.getElementById('v-change').innerText = (csh - tot).toLocaleString();
    }

    // FUNGSI PRINT RAWBT (Karyawan & Admin sama)
    function sendToPrinter(text) {
        try {
            const rawbtUrl = "rawbt:base64," + btoa(unescape(encodeURIComponent(text)));
            window.location.href = rawbtUrl;
        } catch (e) {
            alert("Printer RAWBT tidak merespons. Pastikan sudah terinstal.");
        }
    }

    async function doPay() {
        const tot = parseInt(document.getElementById('v-total').innerText.replace(/\D/g,''));
        const cash = parseInt(document.getElementById('v-cash').value);
        if(!cart.length || isNaN(cash) || cash < tot) return alert("Uang kurang atau pesanan kosong!");

        const btn = document.getElementById('btn-pay');
        btn.disabled = true; btn.innerText = "MENYIMPAN...";

        const payload = {
            action: 'transaction', 
            items: cart.map(x => x.n).join(", "),
            total: tot, cash: cash, change: cash - tot, kasir: user,
            itemCount: cart.filter(x => PRICING[x.n] >= 10000).length
        };

        try {
            const r = await fetch(API, { method: 'POST', body: JSON.stringify(payload) });
            const res = await r.json();
            if(res.success) {
                // CETAK OTOMATIS
                let receiptTeks = generateReceiptText(cart, tot, cash, cash-tot, user);
                sendToPrinter(receiptTeks);
                
                // RESET
                cart = []; renderCart();
                document.querySelectorAll('[id^="q-"]').forEach(el => el.innerText = "0");
                document.getElementById('v-cash').value = "";
                alert("Berhasil!");
            }
        } catch (e) { alert("Gagal Simpan Database!"); }
        finally { btn.disabled = false; btn.innerText = "BAYAR & CETAK STRUK"; }
    }

    function generateReceiptText(items, tot, cash, chg, ksr) {
        let t = "      YA!COOL DRINK\n  " + new Date().toLocaleString() + "\n--------------------------------\n";
        
        // Handle input baik berupa array (kasir baru) atau teks (dari history)
        if (Array.isArray(items)) {
            const group = items.reduce((a, b) => { a[b.n] = (a[b.n] || 0) + 1; return a; }, {});
            for (const [n, q] of Object.entries(group)) {
                t += `${q}x ${n.substring(0,18)}`.padEnd(22) + (q * PRICING[n]).toLocaleString().padStart(10) + "\n";
            }
        } else {
            items.split(", ").forEach(n => {
                t += n.substring(0,21).padEnd(22) + (PRICING[n.trim()] || 0).toLocaleString().padStart(10) + "\n";
            });
        }
        
        t += "--------------------------------\n";
        t += "TOTAL:".padEnd(20) + tot.toLocaleString().padStart(12) + "\n";
        t += "BAYAR:".padEnd(20) + cash.toLocaleString().padStart(12) + "\n";
        t += "KEMBALI:".padEnd(20) + chg.toLocaleString().padStart(10) + "\n";
        t += "--------------------------------\nKasir: " + ksr + "\n\n      TERIMA KASIH\n\n\n\n";
        return t;
    }

    async function showHistory() {
        document.getElementById('area-kasir').classList.add('hidden');
        document.getElementById('area-history').classList.remove('hidden');
        document.getElementById('h-list').innerHTML = "<tr><td colspan='3' class='text-center'>Memuat Riwayat...</td></tr>";
        
        try {
            const r = await fetch(API, { method: 'POST', body: JSON.stringify({ action: 'getData' }) });
            const d = await r.json();
            // FILTER: Hanya ambil data sales milik kasir ini saja
            const history = d.sales.slice(1).filter(s => s[5] === user).reverse();
            
            document.getElementById('h-list').innerHTML = history.map(s => `
                <tr>
                    <td>${new Date(s[0]).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</td>
                    <td>${parseInt(s[2]).toLocaleString()}</td>
                    <td>
                        <button class="btn btn-primary btn-sm" onclick="printFromHistory('${s[1]}', ${s[2]}, ${s[3]}, ${s[4]}, '${s[5]}')">
                            <i class="bi bi-printer"></i>
                        </button>
                    </td>
                </tr>`).join('');
            if(history.length === 0) document.getElementById('h-list').innerHTML = "<tr><td colspan='3' class='text-center'>Belum ada transaksi hari ini</td></tr>";
        } catch (e) { alert("Gagal muat history!"); }
    }

    function printFromHistory(items, tot, cash, chg, ksr) {
        let text = generateReceiptText(items, tot, cash, chg, ksr);
        sendToPrinter(text);
    }

    function backToKasir() { document.getElementById('area-history').classList.add('hidden'); document.getElementById('area-kasir').classList.remove('hidden'); }

    // BAGIAN ADMIN
    async function loadAdminStats() {
        const tgl = document.getElementById('admin-filter-date').value;
        try {
            const r = await fetch(API, { method: 'POST', body: JSON.stringify({ action: 'getData' }) });
            const d = await r.json();
            let omset = 0, cups = 0, sisaCup = 0, stokHtml = "";
            d.sales.slice(1).forEach(s => {
                if(new Date(s[0]).toISOString().split('T')[0] === tgl) { omset += parseInt(s[2]); cups += parseInt(s[6]); }
            });
            if(d.stok) {
                d.stok.slice(1).forEach(row => {
                    if(row[0] === "Cup") sisaCup = row[1];
                    stokHtml += `<div class="d-flex justify-content-between border-bottom py-2"><span>${row[0]}</span><span class="fw-bold">${row[1]}</span></div>`;
                });
            }
            document.getElementById('adm-omset').innerText = "Rp " + omset.toLocaleString();
            document.getElementById('adm-cups').innerText = cups;
            document.getElementById('adm-stok-cup').innerText = sisaCup;
            document.getElementById('adm-profit').innerText = "Rp " + (omset * 0.4).toLocaleString();
            document.getElementById('adm-detail-stok').innerHTML = stokHtml;
        } catch (e) { alert("Gagal tarik data"); }
    }

    function printLaporanAdmin() {
        let t = "   LAPORAN STOK YA!COOL\n--------------------------------\n";
        document.querySelectorAll('#adm-detail-stok div').forEach(el => { t += el.innerText.replace("\n", ": ") + "\n"; });
        t += "\nDicetak: " + new Date().toLocaleString() + "\n\n\n\n";
        sendToPrinter(t);
    }
</script>
</body>
</html>
