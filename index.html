<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <title>Ya!Cool POS System - Premium</title>
    <style>
        :root {
            --primary: #0093E9;
            --secondary: #80D0C7;
            --dark: #2b2d42;
            --glass: rgba(255, 255, 255, 0.85);
        }

        body { 
            background: linear-gradient(135deg, #0093E9 0%, #80D0C7 100%);
            background-attachment: fixed;
            font-family: 'Poppins', sans-serif; 
            min-height: 100vh;
            color: var(--dark);
        }

        .hidden { display: none !important; }

        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
            transition: all 0.3s ease;
        }

        .btn-3d {
            border-radius: 12px;
            border: none;
            box-shadow: 0 4px 0 #006da8;
            font-weight: 600;
            transition: 0.1s;
        }

        .btn-3d:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0 #006da8;
        }

        .qty-btn {
            width: 38px; height: 38px;
            border-radius: 10px; border: none;
            background: white; box-shadow: 0 3px 6px rgba(0,0,0,0.1);
            font-weight: bold; transition: 0.2s;
        }

        .qty-btn:hover { background: #f8f9fa; transform: scale(1.1); }

        .logo-area {
            font-size: 2.5rem; font-weight: 800;
            background: linear-gradient(to right, #0052D4, #4364F7, #6FB1FC);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
        }

        .stat-card {
            background: white; padding: 20px; border-radius: 18px;
            text-align: center; border-bottom: 5px solid var(--primary);
        }

        .menu-item {
            border-radius: 15px; background: rgba(255,255,255,0.5);
            margin-bottom: 10px; border: 1px solid rgba(255,255,255,0.2);
            transition: 0.3s;
        }
        
        .menu-item:hover { background: white; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-fade { animation: fadeIn 0.5s ease forwards; }
        @media print { .no-print { display: none; } }
    </style>
</head>
<body>

<div id="p-login" class="container d-flex align-items-center justify-content-center" style="min-height: 100vh;">
    <div class="glass-card p-5 text-center animate-fade" style="max-width: 450px; width: 90%;">
        <div class="logo-area"><i class="bi bi-cup-straw"></i> Ya!Cool</div>
        <p class="text-muted mb-4">Silahkan masuk ke akun Kasir/Admin</p>
        <div class="mb-3"><input type="text" id="u" class="form-control" placeholder="Username"></div>
        <div class="mb-4"><input type="password" id="p" class="form-control" placeholder="Password"></div>
        <button onclick="doLogin()" id="btn-login" class="btn btn-primary btn-lg w-100 btn-3d py-3">MASUK SISTEM</button>
    </div>
</div>

<div id="p-staff" class="container-fluid py-4 hidden">
    <div class="row">
        <div class="col-md-7 no-print">
            <div class="glass-card p-4 mb-3 d-flex justify-content-between align-items-center">
                <div>
                    <h4 class="fw-bold m-0"><i class="bi bi-person-circle text-primary"></i> <span id="lbl-user"></span></h4>
                    <small class="text-muted">Kasir Ya!Cool</small>
                </div>
                <button class="btn btn-danger rounded-pill px-4" onclick="location.reload()"><i class="bi bi-power"></i></button>
            </div>

            <button class="btn btn-light w-100 glass-card py-3 fw-bold text-primary mb-3" onclick="showHistory()">
                <i class="bi bi-clock-history me-2"></i> RIWAYAT & CETAK LAPORAN SETORAN
            </button>
            
            <div id="area-kasir" class="glass-card p-3 animate-fade">
                <h5 class="fw-bold mb-3 ms-2 text-primary"><i class="bi bi-grid-fill"></i> Daftar Menu</h5>
                <div id="m-list" class="row g-2 overflow-auto" style="max-height: 60vh;"></div>
            </div>

            <div id="area-history" class="hidden animate-fade">
                <button class="btn btn-dark w-100 mb-3 fw-bold rounded-pill" onclick="backToKasir()">← KEMBALI KE KASIR</button>
                <div class="glass-card p-4 mb-3">
                    <label class="small fw-bold mb-2">Pilih Tanggal Riwayat & Rekap:</label>
                    <div class="input-group">
                        <input type="date" id="hist-filter-date" class="form-control border-primary" onchange="showHistory()">
                        <button class="btn btn-primary px-3" onclick="showHistory()"><i class="bi bi-search"></i></button>
                        <button class="btn btn-success px-3 fw-bold" onclick="printRekapKasir()"><i class="bi bi-printer-fill me-1"></i> REKAP</button>
                    </div>
                </div>
                <div class="glass-card p-3 overflow-auto" style="max-height: 50vh;">    
                    <table class="table table-hover small">
                        <thead class="table-light"><tr><th>Tgl/Jam</th><th>Total</th><th>Aksi</th></tr></thead>
                        <tbody id="h-list"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div class="col-md-5 no-print mt-3 mt-md-0">
            <div class="glass-card p-4 sticky-top animate-fade" style="top: 20px;">
                <h5 class="fw-bold border-bottom pb-3 mb-3"><i class="bi bi-receipt-cutoff me-2"></i> Detail Pesanan</h5>
                <div id="cart-list" style="min-height: 100px; max-height: 200px; overflow-y: auto;" class="mb-3"></div>
                <div class="bg-primary text-white p-3 rounded-4 mb-3 d-flex justify-content-between align-items-center">
                    <span class="h6 m-0">TOTAL</span>
                    <span class="h3 fw-bold m-0">Rp <span id="v-total">0</span></span>
                </div>
                <div class="mb-2">
                    <label class="small fw-bold text-muted mb-1">UANG TUNAI (CASH)</label>
                    <input type="number" id="v-cash" oninput="calc()" class="form-control form-control-lg fw-bold text-success border-2" placeholder="0">
                </div>
                <div class="d-flex justify-content-between p-3 rounded-4 bg-light mb-4 border shadow-sm">
                    <span class="fw-bold">KEMBALIAN</span>
                    <span class="fw-bold text-danger h5 m-0">Rp <span id="v-change">0</span></span>
                </div>
                <button onclick="doPay()" id="btn-pay" class="btn btn-success w-100 btn-lg btn-3d py-3 shadow-lg">
                    PROSES & CETAK STRUK <i class="bi bi-printer-fill ms-2"></i>
                </button>
            </div>
        </div>
    </div>
</div>

<div id="p-admin" class="container py-5 hidden animate-fade">
    <div class="glass-card p-4 mb-4 d-flex justify-content-between align-items-center">
        <h2 class="fw-bold m-0 text-primary"><i class="bi bi-shield-lock-fill me-2"></i> Admin Panel</h2>
        <button onclick="location.reload()" class="btn btn-outline-danger px-4 rounded-pill">Logout</button>
    </div>
    <div class="glass-card p-4 mb-4">
        <div class="row g-3">
            <div class="col-md-4">
                <label class="small fw-bold">Filter Tanggal</label>
                <input type="date" id="admin-filter-date" class="form-control">
            </div>
            <div class="col-md-8 d-flex align-items-end gap-2">
                <button class="btn btn-primary btn-3d px-4" onclick="loadAdminStats()">TARIK DATA</button>
                <button class="btn btn-success btn-3d px-4" onclick="printLaporanAdmin()">CETAK LAPORAN STOK</button>
            </div>
        </div>
    </div>
    <div class="row g-4 mb-4">
        <div class="col-6 col-md-3"><div class="stat-card shadow-sm"><i class="bi bi-cash-stack h2 text-primary"></i><p class="small text-muted mt-2 mb-0">OMSET</p><h4 id="adm-omset" class="fw-bold">0</h4></div></div>
        <div class="col-6 col-md-3"><div class="stat-card shadow-sm"><i class="bi bi-cup-straw h2 text-success"></i><p class="small text-muted mt-2 mb-0">CUP TERJUAL</p><h4 id="adm-cups" class="fw-bold">0</h4></div></div>
        <div class="col-6 col-md-3"><div class="stat-card shadow-sm"><i class="bi bi-box-seam h2 text-warning"></i><p class="small text-muted mt-2 mb-0">STOK CUP</p><h4 id="adm-stok-cup" class="fw-bold">0</h4></div></div>
        <div class="col-6 col-md-3"><div class="stat-card shadow-sm"><i class="bi bi-graph-up-arrow h2 text-danger"></i><p class="small text-muted mt-2 mb-0">PROFIT</p><h4 id="adm-profit" class="fw-bold">0</h4></div></div>
    </div>
    <div class="glass-card p-4 shadow-sm"><div id="adm-detail-stok"></div></div>
</div>

<script>
    const API = "https://script.google.com/macros/s/AKfycbz7Qdsnze_d0vAC460hUWOxRbEvgIDea_4RSvT8etHf7BCu9FKJASIqjRaLFtahd3Q/exec"; 
    let cart = []; let user = "";
    const PRICING = { "Mangga":10000, "Jeruk":10000, "Strawberry":10000, "Anggur":10000, "Belimbing":10000, "Jambu":10000, "Nanas":10000, "Apel":10000, "Semangka":10000, "Jelly":2000, "Cheese":2000, "Oreo":2000, };

    async function doLogin() {
        const u = document.getElementById('u').value, p = document.getElementById('p').value;
        if(!u || !p) return;
        document.getElementById('btn-login').innerHTML = `<span class="spinner-border spinner-border-sm"></span> Loading...`;
        try {
            const r = await fetch(API, { method: 'POST', body: JSON.stringify({ action: 'login', user: u, pass: p }) });
            const d = await r.json();
            if (d.success) {
                user = d.user;
                document.getElementById('p-login').classList.add('hidden');
                if(d.role === 'admin') {
                    document.getElementById('p-admin').classList.remove('hidden');
                    document.getElementById('admin-filter-date').valueAsDate = new Date();
                    loadAdminStats();
                } else {
                    document.getElementById('p-staff').classList.remove('hidden');
                    document.getElementById('lbl-user').innerText = user;
                    document.getElementById('hist-filter-date').valueAsDate = new Date();
                    initMenu();
                }
            } else { alert("Login Gagal!"); location.reload(); }
        } catch (e) { alert("Kesalahan Jaringan!"); location.reload(); }
    }

    function initMenu() {
        document.getElementById('m-list').innerHTML = Object.entries(PRICING).map(([n, p]) => `
            <div class="col-12">
                <div class="menu-item d-flex justify-content-between align-items-center p-3 shadow-sm">
                    <div class="d-flex align-items-center">
                        <div class="bg-primary text-white rounded-circle d-flex align-items-center justify-content-center me-3" style="width:40px; height:40px"><i class="bi bi-cup-straw"></i></div>
                        <div><div class="fw-bold">${n}</div><small class="text-muted">Rp ${p.toLocaleString()}</small></div>
                    </div>
                    <div class="qty-control d-flex align-items-center gap-3">
                        <button class="qty-btn" onclick="updateQty('${n}', ${p}, -1)">-</button>
                        <span id="q-${n.replace(/\s/g,'')}" class="fw-bold h5 m-0" style="min-width:25px; text-align:center">0</span>
                        <button class="qty-btn bg-primary text-white" onclick="updateQty('${n}', ${p}, 1)">+</button>
                    </div>
                </div>
            </div>`).join('');
    }

    function updateQty(n, p, c) {
        const lbl = document.getElementById(`q-${n.replace(/\s/g,'')}`);
        let cur = parseInt(lbl.innerText);
        if(cur + c < 0) return;
        lbl.innerText = cur + c;
        if(c > 0) cart.push({ n, p });
        else { const idx = cart.findLastIndex(x => x.n === n); if(idx !== -1) cart.splice(idx, 1); }
        renderCart();
    }

    function renderCart() {
        let t = 0;
        const group = cart.reduce((a, b) => { a[b.n] = (a[b.n] || 0) + 1; t += b.p; return a; }, {});
        document.getElementById('cart-list').innerHTML = Object.entries(group).map(([n, q]) => `
            <div class="d-flex justify-content-between align-items-center mb-2 p-2 bg-white rounded shadow-sm">
                <span class="small fw-bold">${q}x ${n}</span>
                <span class="badge bg-secondary">Rp ${(q*PRICING[n]).toLocaleString()}</span>
            </div>`).join('') || '<p class="text-center text-muted small mt-3">Keranjang Kosong</p>';
        document.getElementById('v-total').innerText = t.toLocaleString();
        calc();
    }

    function calc() {
        const tot = parseInt(document.getElementById('v-total').innerText.replace(/\D/g,'')) || 0;
        const csh = parseInt(document.getElementById('v-cash').value) || 0;
        document.getElementById('v-change').innerText = Math.max(0, csh - tot).toLocaleString();
    }

    function sendToPrinter(text) {
        window.location.href = "rawbt:base64," + btoa(unescape(encodeURIComponent(text)));
    }

    async function doPay() {
        const tot = parseInt(document.getElementById('v-total').innerText.replace(/\D/g,''));
        const cash = parseInt(document.getElementById('v-cash').value);
        if(!cart.length || cash < tot) return alert("Pembayaran kurang!");
        const btn = document.getElementById('btn-pay');
        const originalCart = [...cart];
        btn.disabled = true; btn.innerText = "MENYIMPAN...";
        try {
            const r = await fetch(API, { method: 'POST', body: JSON.stringify({ 
                action: 'transaction', items: cart.map(x => x.n).join(", "), total: tot, cash: cash, change: cash - tot, kasir: user,
                itemCount: cart.filter(x => PRICING[x.n] >= 10000).length
            }) });
            const res = await r.json();
            if(res.success) {
                sendToPrinter(generateReceiptText(originalCart, tot, cash, cash-tot, user));
                cart = []; renderCart();
                document.querySelectorAll('[id^="q-"]').forEach(el => el.innerText = "0");
                document.getElementById('v-cash').value = "";
                alert("Berhasil!");
            }
        } catch (e) { alert("Gagal Simpan!"); }
        finally { btn.disabled = false; btn.innerText = "PROSES & CETAK STRUK"; }
    }

    function generateReceiptText(items, tot, cash, chg, ksr) {
    // 1. Header (Gunakan spasi manual agar teks di tengah)
    let t = "         YA!COOL DRINK\n";
    t += "      " + new Date().toLocaleString('id-ID') + "\n";
    t += "--------------------------------\n"; // 32 Karakter

    if (Array.isArray(items)) {
        // Mengelompokkan item yang sama
        const group = items.reduce((a, b) => { a[b.n] = (a[b.n] || 0) + 1; return a; }, {});
        
        for (const [n, q] of Object.entries(group)) {
            let hargaTotal = q * PRICING[n];
            // Nama barang (maks 18 huruf) + jumlah beli
            let barisNama = `${q}x ${n.substring(0, 18)}`;
            // Gabungkan: Nama di kiri (padEnd 22), Total Harga di kanan (padStart 10)
            t += barisNama.padEnd(22) + hargaTotal.toLocaleString('id-ID').padStart(10) + "\n";
        }
    }

    // 2. Bagian Total, Bayar, Kembali
    t += "--------------------------------\n";
    t += "TOTAL:".padEnd(15) + "Rp " + tot.toLocaleString('id-ID').padStart(11) + "\n";
    t += "BAYAR:".padEnd(15) + "Rp " + cash.toLocaleString('id-ID').padStart(11) + "\n";
    t += "KEMBALI:".padEnd(15) + "Rp " + chg.toLocaleString('id-ID').padStart(11) + "\n";
    
    // 3. Footer
    t += "--------------------------------\n";
    t += "Kasir: " + ksr + "\n\n";
    t += "       TERIMA KASIH\n";
    t += "    SELAMAT MENIKMATI\n\n\n\n";
    
    return t;
}

    async function showHistory() {
    document.getElementById('area-kasir').classList.add('hidden');
    document.getElementById('area-history').classList.remove('hidden');
    
    const filterDate = document.getElementById('hist-filter-date').value; // Format: YYYY-MM-DD
    const hList = document.getElementById('h-list');
    hList.innerHTML = "<tr><td colspan='3' class='text-center'>Memuat...</td></tr>";

    try {
        const r = await fetch(API, { method: 'POST', body: JSON.stringify({ action: 'getData' }) });
        const d = await r.json();
        
        // Filter menggunakan local date string agar tidak kena masalah Timezone UTC
        const history = d.sales.slice(1).filter(s => {
            const tglTransaksi = new Date(s[0]);
            
            // Mengubah objek tanggal transaksi ke format YYYY-MM-DD lokal
            const tahun = tglTransaksi.getFullYear();
            const bulan = String(tglTransaksi.getMonth() + 1).padStart(2, '0');
            const hari = String(tglTransaksi.getDate()).padStart(2, '0');
            const localDateString = `${tahun}-${bulan}-${hari}`;

            return s[5] === user && localDateString === filterDate;
        }).reverse();

        hList.innerHTML = history.map(s => `
            <tr>
                <td class="small">
                    ${new Date(s[0]).toLocaleDateString('id-ID',{day:'2-digit',month:'2-digit'})} 
                    ${new Date(s[0]).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}
                </td>
                <td class="fw-bold text-primary">${parseInt(s[2]).toLocaleString()}</td>
                <td>
                    <button class="btn btn-sm btn-primary" onclick="sendToPrinter(generateReceiptText('${s[1]}', ${s[2]}, ${s[3]}, ${s[4]}, '${s[5]}'))">
                        <i class="bi bi-printer"></i>
                    </button>
                </td>
            </tr>`).join('') || "<tr><td colspan='3' class='text-center text-muted'>Tidak ada data pada tanggal ini</td></tr>";
            
    } catch (e) { 
        alert("Gagal muat history"); 
        console.error(e);
    }
}

    // FITUR CETAK REKAP SETORAN KASIR
    async function printRekapKasir() {
    const filterDate = document.getElementById('hist-filter-date').value; // Format: DD-MM-YYYY
    if (!filterDate) return alert("Pilih tanggal terlebih dahulu!");

    try {
        const r = await fetch(API, { method: 'POST', body: JSON.stringify({ action: 'getData' }) });
        const d = await r.json();
        
        let total = 0, cups = 0, count = 0;

        d.sales.slice(1).forEach(s => {
            const tglTransaksi = new Date(s[0]);
            
            // Konversi tanggal transaksi ke format YYYY-MM-DD lokal
            const tahun = tglTransaksi.getFullYear();
            const bulan = String(tglTransaksi.getMonth() + 1).padStart(2, '0');
            const hari = String(tglTransaksi.getDate()).padStart(2, '0');
            const localDateString = `${tahun}-${bulan}-${hari}`;

            // Filter berdasarkan Kasir DAN Tanggal Lokal
            if(s[5] === user && localDateString === filterDate) { 
                total += parseInt(s[2]); 
                cups += parseInt(s[6]); 
                count++; 
            }
        });

        if (count === 0) {
            alert("Tidak ada transaksi untuk kasir " + user + " pada tanggal " + filterDate);
            return;
        }

        let t = "      REKAP SETORAN KASIR\n";
    t += "         ya!cool Drink\n"; 
    t += "    ---------------------\n";
    t += "Kasir   : " + user + "\n";
    t += "Tanggal : " + filterDate + "\n";
    t += "--------------------------------\n";
    t += "Trans   : " + count + " Nota\n";
    t += "Cup Laku: " + cups + " Cup\n";
    t += "OMSET   : Rp " + total.toLocaleString('id-ID') + "\n";
    t += "--------------------------------\n\n";
    t += "      Tanda Tangan\n\n\n";
    t += "      (..........)\n\n\n\n";
        
        sendToPrinter(t);
    } catch (e) { 
        alert("Gagal cetak rekap. Pastikan koneksi internet stabil."); 
        console.error(e);
    }
}

    function backToKasir() { document.getElementById('area-history').classList.add('hidden'); document.getElementById('area-kasir').classList.remove('hidden'); }

    async function loadAdminStats() {
        const tgl = document.getElementById('admin-filter-date').value;
        try {
            const r = await fetch(API, { method: 'POST', body: JSON.stringify({ action: 'getData' }) });
            const d = await r.json();
            let omset = 0, cups = 0, sisaCup = 0, stokHtml = "";
            d.sales.slice(1).forEach(s => { if(new Date(s[0]).toISOString().split('T')[0] === tgl) { omset += parseInt(s[2]); cups += parseInt(s[6]); } });
            if(d.stok) {
                d.stok.slice(1).forEach(row => {
                    if(row[0] === "Cup") sisaCup = row[1];
                    stokHtml += `<div class="d-flex justify-content-between p-3 border-bottom bg-white mb-1 rounded"><span>${row[0]}</span><span class="fw-bold">${row[1]}</span></div>`;
                });
            }
            document.getElementById('adm-omset').innerText = "Rp " + omset.toLocaleString();
            document.getElementById('adm-cups').innerText = cups;
            document.getElementById('adm-stok-cup').innerText = sisaCup;
            document.getElementById('adm-profit').innerText = "Rp " + (omset * 0.4).toLocaleString();
            document.getElementById('adm-detail-stok').innerHTML = stokHtml;
        } catch (e) { alert("Gagal tarik data!"); }
    }

    function printLaporanAdmin() {
        let t = "   LAPORAN STOK YA!COOL\n--------------------------------\n";
        document.querySelectorAll('#adm-detail-stok div').forEach(el => { t += el.innerText.replace("\n", ": ") + "\n"; });
        t += "\nDicetak: " + new Date().toLocaleString() + "\n\n\n\n";
        sendToPrinter(t);
    }
</script>
</body>
</html>
