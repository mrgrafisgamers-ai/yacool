<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <title>Ya!Cool POS Final Precision</title>
    <style>
        body { background: #f0f2f5; font-family: sans-serif; }
        .hidden { display: none !important; }
        .card { border-radius: 15px; border: none; box-shadow: 0 4px 10px rgba(0,0,0,0.08); }
        .list-group-item { cursor: pointer; transition: 0.2s; border-left: 5px solid transparent; }
        .list-group-item:hover { background: #e7f3ff; border-left: 5px solid #0d6efd; }
        .qty-control { display: flex; align-items: center; gap: 8px; }
        .qty-btn { width: 30px; height: 30px; border-radius: 8px; border: 1px solid #ddd; background: white; font-weight: bold; }
        .stat-card { background: white; padding: 15px; border-radius: 12px; text-align: center; border-bottom: 4px solid #0d6efd; }
        #receipt { width: 58mm; padding: 10px; display: none; font-family: 'Courier New', monospace; font-size: 12px; }
        @media print { .no-print { display: none; } #receipt { display: block; } }
    </style>
</head>
<body>

<div id="p-login" class="container mt-5" style="max-width: 400px;">
    <div class="card p-4 text-center shadow">
        <h3 class="fw-bold text-primary mb-4">Ya!Cool POS</h3>
        <input type="text" id="u" class="form-control mb-2" placeholder="Username">
        <input type="password" id="p" class="form-control mb-3" placeholder="Password">
        <button onclick="doLogin()" id="btn-login" class="btn btn-primary w-100 fw-bold">MASUK</button>
    </div>
</div>

<div id="p-staff" class="container-fluid py-3 hidden">
    <div class="row">
        <div class="col-md-7 no-print">
            <div class="d-flex justify-content-between mb-3 align-items-center">
                <h5 class="fw-bold m-0 text-dark">Kasir: <span id="lbl-user" class="text-primary"></span></h5>
                <div>
                    <button class="btn btn-sm btn-outline-primary" onclick="showHistory()"><i class="bi bi-clock-history"></i></button>
                    <button class="btn btn-sm btn-outline-danger" onclick="location.reload()"><i class="bi bi-power"></i></button>
                </div>
            </div>
            <div id="area-kasir" class="card p-3 shadow-sm">
                <p class="small fw-bold text-muted mb-2 border-bottom pb-1">MENU & TOPPING</p>
                <div id="m-list" class="list-group list-group-flush" style="max-height: 65vh; overflow-y: auto;"></div>
            </div>
            <div id="area-history" class="hidden">
                <button class="btn btn-sm btn-secondary mb-3" onclick="backToKasir()">← Kembali</button>
                <div class="card p-2 shadow-sm"><table class="table table-sm small"><thead><tr><th>Jam</th><th>Total</th><th>Aksi</th></tr></thead><tbody id="h-list"></tbody></table></div>
            </div>
        </div>
        <div class="col-md-5 no-print">
            <div class="card p-3 shadow border-0" style="position: sticky; top: 10px;">
                <h6 class="fw-bold"><i class="bi bi-cart"></i> Detail Pesanan</h6>
                <div id="cart-list" style="min-height: 100px; max-height: 200px; overflow-y: auto;" class="mb-2 border-bottom"></div>
                <div class="d-flex justify-content-between h4 fw-bold text-primary mt-2"><span>TOTAL</span><span id="v-total">0</span></div>
                <div class="mt-3">
                    <label class="small fw-bold">Uang Bayar (Cash)</label>
                    <input type="number" id="v-cash" oninput="calc()" class="form-control form-control-lg fw-bold text-success" placeholder="0">
                </div>
                <div class="d-flex justify-content-between mt-2 h5 text-danger fw-bold bg-light p-2 rounded"><span>Kembali:</span><span id="v-change">0</span></div>
                <button onclick="doPay()" id="btn-pay" class="btn btn-success w-100 mt-3 btn-lg fw-bold shadow">BAYAR & CETAK</button>
            </div>
        </div>
    </div>
</div>

<div id="p-admin" class="container py-4 hidden">
    <div class="d-flex justify-content-between mb-4 align-items-center">
        <h3 class="fw-bold text-dark m-0">Admin Panel</h3>
        <button onclick="location.reload()" class="btn btn-danger btn-sm shadow-sm">Logout</button>
    </div>
    
    <div class="card p-3 mb-4 shadow-sm border-0 bg-white">
        <label class="small fw-bold mb-2">Laporan Tanggal:</label>
        <div class="input-group">
            <input type="date" id="admin-filter-date" class="form-control">
            <button class="btn btn-primary px-3" onclick="loadAdminStats()"><i class="bi bi-search"></i> Tarik Data</button>
            <button class="btn btn-success px-3" onclick="printLaporanAdmin()"><i class="bi bi-printer"></i> Cetak Laporan</button>
        </div>
    </div>

    <div class="row g-3 mb-4">
        <div class="col-6 col-md-3"><div class="stat-card"><p class="small text-muted mb-1">OMSET</p><h4 id="adm-omset" class="fw-bold text-primary">0</h4></div></div>
        <div class="col-6 col-md-3"><div class="stat-card"><p class="small text-muted mb-1">CUP TERJUAL</p><h4 id="adm-cups" class="fw-bold text-success">0</h4></div></div>
        <div class="col-6 col-md-3"><div class="stat-card"><p class="small text-muted mb-1">SISA STOK CUP</p><h4 id="adm-stok-cup" class="fw-bold text-warning">0</h4></div></div>
        <div class="col-6 col-md-3"><div class="stat-card"><p class="small text-muted mb-1">EST. PROFIT</p><h4 id="adm-profit" class="fw-bold text-danger">0</h4></div></div>
    </div>

    <div class="card p-3 shadow-sm border-0">
        <h6 class="fw-bold border-bottom pb-2 text-secondary"><i class="bi bi-box-seam me-1"></i> Detail Sisa Stok Bahan</h6>
        <div id="adm-detail-stok" class="small mt-2">
            </div>
    </div>
</div>

<div id="receipt"></div>

<script>
    const API = "https://script.google.com/macros/s/AKfycbz7Qdsnze_d0vAC460hUWOxRbEvgIDea_4RSvT8etHf7BCu9FKJASIqjRaLFtahd3Q/exec"; 
    let cart = []; let user = "";
    const PRICING = { "Nanas":10000, "Mangga":10000, "Strawberry":10000, "Anggur":10000, "Semangka":10000, "Melon":10000, "Jeruk":10000, "Apel":10000, "Belimbing":10000, "Boba":2000, "Jelly":2000, "Cheese":2000, "Oreo":2000, "Meses":2000 };

    async function doLogin() {
        const u = document.getElementById('u').value, p = document.getElementById('p').value;
        if(!u || !p) return;
        document.getElementById('btn-login').innerText = "Authenticating...";
        try {
            const r = await fetch(API, { method: 'POST', body: JSON.stringify({ action: 'login', user: u, pass: p }) });
            const d = await r.json();
            if (d.success) {
                user = d.user;
                document.getElementById('p-login').classList.add('hidden');
                if(d.role === 'admin') {
                    document.getElementById('p-admin').classList.remove('hidden');
                    // Set default date to today for admin
                    document.getElementById('admin-filter-date').valueAsDate = new Date();
                    loadAdminStats();
                } else {
                    document.getElementById('p-staff').classList.remove('hidden');
                    document.getElementById('lbl-user').innerText = user;
                    initMenu();
                }
            } else { alert("User/Pass Salah!"); location.reload(); }
        } catch (e) { alert("Error Koneksi API! Pastikan Script dideploy as Anyone."); location.reload(); }
    }

    function initMenu() {
        const list = document.getElementById('m-list');
        list.innerHTML = Object.entries(PRICING).map(([name, price]) => `
            <div class="list-group-item d-flex justify-content-between align-items-center py-3">
                <div><div class="fw-bold">${name}</div><small class="text-muted">Rp ${price.toLocaleString()}</small></div>
                <div class="qty-control">
                    <button class="qty-btn" onclick="updateQty('${name}', ${price}, -1)">-</button>
                    <span id="q-${name.replace(/\s/g,'')}" class="fw-bold mx-2">0</span>
                    <button class="qty-btn bg-primary text-white border-0" onclick="updateQty('${name}', ${price}, 1)">+</button>
                </div>
            </div>`).join('');
    }

    function updateQty(n, p, c) {
        const lbl = document.getElementById(`q-${n.replace(/\s/g,'')}`);
        let cur = parseInt(lbl.innerText);
        if(cur + c < 0) return;
        lbl.innerText = cur + c;
        if(c > 0) cart.push({ n, p, id: Date.now() + Math.random() });
        else { const idx = cart.findLastIndex(x => x.n === n); if(idx !== -1) cart.splice(idx, 1); }
        renderCart();
    }

    function renderCart() {
        let t = 0;
        const group = cart.reduce((a, b) => { a[b.n] = (a[b.n] || 0) + 1; t += b.p; return a; }, {});
        document.getElementById('cart-list').innerHTML = Object.entries(group).map(([n, q]) => `
            <div class="d-flex justify-content-between small py-1"><span>${q}x ${n}</span><span class="fw-bold">Rp ${(q*PRICING[n]).toLocaleString()}</span></div>
        `).join('') || '<p class="text-center text-muted small mt-2">Kosong</p>';
        document.getElementById('v-total').innerText = t.toLocaleString();
        calc();
    }

    function calc() {
        const tot = parseInt(document.getElementById('v-total').innerText.replace(/\D/g,'')) || 0;
        const csh = parseInt(document.getElementById('v-cash').value) || 0;
        document.getElementById('v-change').innerText = (csh - tot).toLocaleString();
    }

    async function loadAdminStats() {
    const tgl = document.getElementById('admin-filter-date').value;
    if(!tgl) return alert("Pilih Tanggal!");
    
    document.getElementById('adm-omset').innerText = "Loading...";
    try {
        const r = await fetch(API, { method: 'POST', body: JSON.stringify({ action: 'getData' }) });
        const d = await r.json();
        
        let omset = 0, cups = 0;
        d.sales.slice(1).forEach(s => {
            const rowDate = new Date(s[0]).toISOString().split('T')[0];
            if(rowDate === tgl) {
                omset += parseInt(s[2]) || 0;
                cups += parseInt(s[6]) || 0;
            }
        });

        let stokHtml = "";
        let sisaCupHeader = 0;

        // Tarik data stok dari sheet "Stok" (Data asli 85, 3500, dll)
        if (d.stok) {
            d.stok.slice(1).forEach(row => {
                if(row[0] === "Cup") sisaCupHeader = row[1]; // Ambil angka 85
                
                stokHtml += `
                    <div class="d-flex justify-content-between border-bottom py-2">
                        <span>${row[0]}</span>
                        <span class="fw-bold ${row[1] < 10 ? 'text-danger' : 'text-dark'}">${row[1]}</span>
                    </div>`;
            });
        }

        document.getElementById('adm-omset').innerText = "Rp " + omset.toLocaleString();
        document.getElementById('adm-cups').innerText = cups;
        document.getElementById('adm-stok-cup').innerText = sisaCupHeader; // Muncul 85
        document.getElementById('adm-profit').innerText = "Rp " + (omset * 0.4).toLocaleString();
        document.getElementById('adm-detail-stok').innerHTML = stokHtml;

    } catch (e) {
        alert("Gagal memproses data admin.");
    }
}

// FUNGSI PRINT LAPORAN UNTUK ADMIN
function printLaporanAdmin() {
    const tgl = document.getElementById('admin-filter-date').value || "---";
    const oms = document.getElementById('adm-omset').innerText;
    const cup = document.getElementById('adm-cups').innerText;
    const sisaCup = document.getElementById('adm-stok-cup').innerText;
    
    let detailStok = "";
    document.querySelectorAll('#adm-detail-stok div').forEach(el => {
        detailStok += el.innerText.replace("\n", ": ") + "\n";
    });

    let t = "   LAPORAN HARIAN YA!COOL\n";
    t += "   Tanggal: " + tgl + "\n";
    t += "--------------------------------\n";
    t += "OMSET       : " + oms + "\n";
    t += "CUP TERJUAL : " + cup + "\n";
    t += "SISA CUP    : " + sisaCup + "\n";
    t += "--------------------------------\n";
    t += "DETAIL STOK BAHAN:\n";
    t += detailStok;
    t += "--------------------------------\n\n\n\n";

    // Kirim ke printer via RAWBT
    window.location.href = "rawbt:base64," + btoa(unescape(encodeURIComponent(t)));
}
    async function doPay() {
        const tot = parseInt(document.getElementById('v-total').innerText.replace(/\D/g,''));
        const cash = parseInt(document.getElementById('v-cash').value);
        if(!cart.length || cash < tot) return alert("Cek input!");

        const btn = document.getElementById('btn-pay');
        btn.innerText = "Processing..."; btn.disabled = true;

        const payload = {
            action: 'transaction', 
            items: cart.map(x => x.n).join(", "),
            total: tot, cash: cash, change: cash - tot, kasir: user,
            itemCount: cart.filter(x => PRICING[x.n] >= 10000).length
        };

        try {
            await fetch(API, { method: 'POST', body: JSON.stringify(payload) });
            alert("Berhasil!");
            location.reload();
        } catch (e) { alert("Gagal Simpan"); btn.disabled = false; btn.innerText = "BAYAR & CETAK"; }
    }
</script>
</body>
</html>
